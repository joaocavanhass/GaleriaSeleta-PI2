<div class="produtos-page">

  <!-- Barra de controles -->
  <div class="controles">

    <div class="dropdown-ctrl" (mouseenter)="ordenacaoAberta = true" (mouseleave)="ordenacaoAberta = false">
      <button class="ctrl-btn">Organizar por +</button>
      <div class="dropdown-ctrl-menu" [class.aberto]="ordenacaoAberta">
        <button (click)="ordenacao = 'padrao'; aplicarFiltros()">Padrão</button>
        <button (click)="ordenacao = 'novidades'; aplicarFiltros()">Novidades</button>
        <button (click)="ordenacao = 'menor-preco'; aplicarFiltros()">Menor preço</button>
        <button (click)="ordenacao = 'maior-preco'; aplicarFiltros()">Maior preço</button>
      </div>
    </div>

    <div class="dropdown-ctrl" (mouseenter)="filtroAberto = true" (mouseleave)="filtroAberto = false">
      <button class="ctrl-btn">Filtrar por +</button>
      <div class="dropdown-ctrl-menu direita" [class.aberto]="filtroAberto">
        <button (click)="selecionarCategoria(null)" [class.ativo]="categoriaSelecionada === null">
          Todos
        </button>
        @for (cat of categorias; track cat.id) {
          <button (click)="selecionarCategoria(cat.id)" [class.ativo]="categoriaSelecionada === cat.id">
            {{ cat.nome }}
          </button>
        }
      </div>
    </div>

  </div>

  <!-- Grid de produtos -->
  <div class="produtos-grid">
    @for (produto of produtos; track produto.id) {
      <div class="produto-card" routerLink="/produtos/{{ produto.id }}">

        <div class="produto-imagem">
          @if (produto.imagens && produto.imagens[0].url) {
            <img [src]="produto.imagens[0].url" [alt]="produto.nome" />
          }
        </div>

        <div class="produto-info">
          <div class="produto-nome-preco">
            <span class="produto-nome">{{ produto.nome }}</span>
            <span class="produto-preco" [class.com-desconto]="temDesconto(produto)">
              {{ precoFinal(produto) | currency:'BRL' }}
            </span>
          </div>
          <span class="produto-desc">{{ produto.descricao }}</span>
          @if (temDesconto(produto)) {
            <span class="produto-preco-original">{{ produto.preco | currency:'BRL' }}</span>
          }
        </div>

      </div>
    }
  </div>

</div>
